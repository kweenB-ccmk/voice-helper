<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ghi am</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: #ffffff;
        --text: #152033;
        --muted: #6b778c;
        --line: #d9e2ef;
        --red: #e11d48;
        --nav: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-menu {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 64px;
        padding: 0 32px;
        background: var(--nav);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .menu-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 40px;
        padding: 0 16px;
        border-radius: 8px;
        color: #d1d5db;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
      }

      .menu-link:hover,
      .menu-link.active {
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
      }

      .home {
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex: 1;
        min-height: 0;
      }

      .recording-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 32px;
        background: var(--panel);
        border-right: 1px solid var(--line);
      }

      .recording-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .recording-dot {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: var(--red);
        opacity: 0.35;
        box-shadow: none;
      }

      .is-recording .recording-dot {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.52);
        animation: pulse 1.1s ease-out infinite;
      }

      .recording-text {
        margin: 0;
        font-size: clamp(24px, 3vw, 38px);
        font-weight: 700;
        line-height: 1.15;
      }

      .recording-button {
        width: min(100%, 220px);
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: var(--red);
        color: #ffffff;
        cursor: pointer;
        font-size: 17px;
        font-weight: 700;
      }

      .recording-button:hover {
        background: #be123c;
      }

      .recording-button:focus-visible,
      .menu-link:focus-visible {
        outline: 3px solid rgba(225, 29, 72, 0.28);
        outline-offset: 3px;
      }

      .transcript {
        display: flex;
        flex-direction: column;
        min-width: 0;
        padding: 32px;
      }

      .transcript-box {
        position: relative;
        flex: 1;
        width: 100%;
        min-height: 360px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        font-size: 20px;
        line-height: 1.6;
        overflow-wrap: anywhere;
      }

      .placeholder {
        margin: 0;
        color: var(--muted);
      }

      .summary-button {
        position: absolute;
        right: 24px;
        bottom: 24px;
        min-width: 118px;
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        cursor: pointer;
        font-size: 16px;
        font-weight: 700;
      }

      .summary-button:hover {
        background: #1d4ed8;
      }

      .summary-button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.26);
        outline-offset: 3px;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.92);
          box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.52);
        }

        70% {
          transform: scale(1);
          box-shadow: 0 0 0 16px rgba(225, 29, 72, 0);
        }

        100% {
          transform: scale(0.92);
          box-shadow: 0 0 0 0 rgba(225, 29, 72, 0);
        }
      }

      @media (max-width: 760px) {
        .top-menu {
          min-height: auto;
          padding: 12px;
          overflow-x: auto;
        }

        .menu-link {
          flex: 0 0 auto;
        }

        .home {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .recording-status {
          align-items: flex-start;
          justify-content: flex-start;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .transcript {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <nav class="top-menu" aria-label="Menu chinh">
        <a class="menu-link active" href="#">Trang chủ</a>
        <a class="menu-link" href="#">Lịch sử</a>
        <a class="menu-link" href="#">Deadline</a>
      </nav>

      <main class="home">
        <section class="recording-status" id="recordingStatus" aria-label="Trang thai ghi am">
          <div class="recording-indicator">
            <span class="recording-dot" aria-hidden="true"></span>
            <p class="recording-text" id="recordingText">Chưa ghi âm</p>
          </div>
          <button class="recording-button" id="recordingButton" type="button" aria-pressed="false">
            Bắt đầu ghi âm
          </button>
        </section>

        <section class="transcript" aria-label="Noi dung ghi am">
          <div class="transcript-box" id="transcript">
            <p class="placeholder">Nội dung người nói sẽ hiển thị tại đây.</p>
            <button class="summary-button" type="button">Tóm tắt</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const recordingStatus = document.getElementById("recordingStatus");
      const recordingButton = document.getElementById("recordingButton");
      const recordingText = document.getElementById("recordingText");

      recordingButton.addEventListener("click", () => {
        const isRecording = recordingStatus.classList.toggle("is-recording");

        recordingText.textContent = isRecording ? "Đang ghi âm" : "Chưa ghi âm";
        recordingButton.textContent = isRecording ? "Dừng ghi âm" : "Bắt đầu ghi âm";
        recordingButton.setAttribute("aria-pressed", String(isRecording));
      });
    </script>
  </body>
</html>

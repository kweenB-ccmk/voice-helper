<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VoiceHelper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 id="appTitle">🐱 VoiceHelper</h1>

    <div class="language">
        <button onclick="setLanguage('vi')">🇻🇳 VI</button>
        <button onclick="setLanguage('en')">🇺🇸 EN</button>
    </div>

    <h2 id="calendarTitle">📅 Lịch học</h2>

    <input type="date" id="studyDate">

    <button id="saveBtn" onclick="saveNote()">
💾 Lưu ghi chú
</button>

<button id="loadBtn" onclick="loadNote()">
📖 Xem ghi chú
</button>>

    <div class="record-section">

    <div id="timer">
        00:00
    </div>

    <button id="recordBtn">
        🎤 Ghi âm
    </button>

    <button id="stopBtn">
        ⏹ Dừng
    </button>

</div>

    <h2 id="transcriptTitle">Nội dung</h2>

    <textarea id="transcript"></textarea>

    <button id="analyzeBtn">
        ✨ Phân tích AI
    </button>

    <div id="result"></div>

    <button onclick="exportTXT()">
        📄 TXT
    </button>

    <button onclick="exportMD()">
        📝 MD
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
